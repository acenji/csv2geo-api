          example: ["coffee_shop", "cafe"]
        address:
          type: string
          example: "123 Main St, New York, NY 10001"
        city:
          type: string
          example: "New York"
        state:
          type: string
          example: "NY"
        postcode:
          type: string
          example: "10001"
        country:
          type: string
          example: "US"
        phone:
          type: string

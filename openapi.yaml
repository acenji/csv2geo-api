openapi: 3.0.3
info:
  title: CSV2GEO Geocoding API
  description: |
    Fast, accurate geocoding API powered by 514M+ addresses and 72M+ places worldwide.

    ## Features
    - Forward geocoding (address → coordinates)
    - Reverse geocoding (coordinates → address)
    - Address validation, parsing, and standardization
    - Autocomplete for type-ahead search
    - Batch processing (up to 10,000 addresses per request)
    - **Places API** - Search 72M+ POIs (businesses, landmarks, restaurants)
    - **Divisions API** - 4.6M+ administrative boundaries (cities, counties, neighborhoods)
    - **Utilities** - Timezone lookup, distance calculations
    - Global coverage across 50+ countries with rooftop-level accuracy

    ## Authentication
    All requests require an API key. Include it as:
    - Query parameter: `?api_key=YOUR_KEY`
    - Header: `Authorization: Bearer YOUR_KEY`

    Get your API key at [csv2geo.com/api-keys](https://csv2geo.com/api-keys)

    ### API Key Permissions
    Each API key can have specific permissions:
    - `forward` - Forward geocoding (address → coordinates)
    - `reverse` - Reverse geocoding (coordinates → address)
    - `batch` - Batch processing (POST endpoints)
    - `places` - Places/POI search (search, nearby, categories)
    - `divisions` - Administrative boundaries (search, contains, subtypes)

    ## Rate Limits
    Rate limits are enforced per API key. Check response headers for your current usage:
    - `X-RateLimit-Limit` - Maximum requests per minute
    - `X-RateLimit-Remaining` - Requests remaining in current window
    - `X-RateLimit-Reset` - Unix timestamp when the window resets

    | Tier | Requests/min | Batch Size |
    |------|--------------|------------|
    | Free | 100 | 100 |
    | Starter | 1,000 | 1,000 |
    | Growth | 5,000 | 5,000 |
    | Pro | 10,000 | 10,000 |

    ## Customer URL is canonical
    Every path in this spec is a path on `https://csv2geo.com/api/v1/`. The
    underlying Go service uses slightly different internal paths (e.g.
    `/places/{id}`, `/divisions/{id}`); customers MUST use the customer paths
    shown here, which nest under `/by-id/{id}` for clarity.

    Sprint A (2026-05-09) closed the previously-tracked spec ↔ implementation
    gap: every path documented here is now reachable from the customer URL.
  version: 1.7.4
  contact:
    name: Scale Campaign
    url: https://csv2geo.com
    email: admin@csv2geo.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://csv2geo.com/api/v1
    description: Production server

security:
  - ApiKeyQuery: []
  - ApiKeyHeader: []

tags:
  - name: Geocoding
    description: Forward geocoding - convert addresses to coordinates
  - name: Reverse Geocoding
    description: Reverse geocoding - convert coordinates to addresses
  - name: Address Tools
    description: Validate, parse, standardize, and autocomplete addresses
  - name: Batch
    description: Batch processing for multiple addresses or coordinates
  - name: Places
    description: Search 72M+ POIs - businesses, landmarks, restaurants, and more
  - name: Divisions
    description: 4.6M+ administrative boundaries - cities, counties, neighborhoods, states
  - name: Coverage
    description: Per-country and aggregate dataset coverage statistics
  - name: Routing
    description: Valhalla-backed routing — turn-by-turn directions, isolines, matrices, map-matching, TSP optimization, snap-to-road, elevation. 5 transport modes (drive, walk, bike, truck, motorcycle). Pro plan and above.
  - name: IP Geolocation
    description: Submillisecond MaxMind GeoLite2 IP → city/region/county/ASN lookup. Bundled into every plan, including Free.
  - name: Maps
    description: Visual map services — vector tiles from the OpenStreetMap planet, ready-made MapLibre GL styles, and marker-pin icon rendering.
  - name: Utilities
    description: Timezone lookup, distance calculations, and system health

paths:
  /geocode:
    get:
      tags:
        - Geocoding
      summary: Geocode a single address
      description: Convert a single address to latitude/longitude coordinates
      operationId: geocodeSingle
      parameters:
        - name: q
          in: query
          required: true
          description: The address to geocode
          schema:
            type: string
          example: "1600 Pennsylvania Ave, Washington DC"
        - name: country
          in: query
          required: false
          description: Limit results to a specific country (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (1-5)
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 1
        - name: format
          in: query
          required: false
          description: Response format
          schema:
            type: string
            enum: [full, simple]
            default: full
        - name: include
          in: query
          required: false
          description: |
            Comma-separated list of optional enrichments to inline into each result.
            Currently supported:
              * `meta` — adds a `division` block containing the containing locality's
                name, name_local, name_latin, subtype, population, wikidata, and
                one-level parent (region/county). No second API call needed.
              * `other_names` — adds a per-admin-level `other_names` map to each
                result: `{ "country": { "en": "Austria", "de": "Österreich", ... },
                "region": { ... }, "locality": { ... } }`. Source:
                `divisions.name_international` (1.5M divisions, ~78 langs avg).
                Composable with `?lang=` — primary fields reflect the requested
                language while this block carries the full translation map.
                Sprint 2.1d.
          schema:
            type: string
          example: "meta,other_names"
        - name: lang
          in: query
          required: false
          description: |
            BCP-47 language tag (e.g. `de`, `ja`, `zh-Hant`). When set, the
            embedded admin-level names in `components` (city, state, country,
            district) come back in the requested language using the
            `divisions.name_international` map (1.5M divisions across ~78
            languages on average). Street + house_number stay in source
            language because Overture has no address-level translation data.
            Sprint 2.1c — drop-in compatible with Geoapify's response shape.
          schema:
            type: string
          example: "de"
      responses:
        '200':
          description: Successful geocoding response
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Maximum requests per minute
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Requests remaining in current window
            X-RateLimit-Reset:
              schema:
                type: integer
              description: Unix timestamp when window resets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeResponse'
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_key:
                  summary: Missing API key
                  value:
                    error:
                      code: missing_api_key
                      message: "API key is required. Provide it via 'api_key' query parameter or 'Authorization: Bearer <key>' header."
                      status: 401
                invalid_key:
                  summary: Invalid API key
                  value:
                    error:
                      code: invalid_api_key
                      message: "Invalid API key provided."
                      status: 401
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: insufficient_permissions
                  message: "This API key does not have 'forward' geocoding permission."
                  status: 403
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until rate limit resets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: rate_limit_exceeded
                  message: "Rate limit exceeded. Please wait before making more requests."
                  status: 429
                  retry_after: 45

    post:
      tags:
        - Batch
      summary: Batch geocode multiple addresses
      description: Convert up to 10,000 addresses to coordinates in a single request
      operationId: geocodeBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchGeocodeRequest'
      responses:
        '200':
          description: Successful batch geocoding response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchGeocodeResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reverse:
    get:
      tags:
        - Reverse Geocoding
      summary: Reverse geocode a single coordinate
      description: Convert latitude/longitude coordinates to a human-readable address
      operationId: reverseSingle
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          example: 38.8977
        - name: lng
          in: query
          required: true
          description: Longitude
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          example: -77.0365
        - name: format
          in: query
          required: false
          description: Response format
          schema:
            type: string
            enum: [full, simple]
            default: full
        - name: include
          in: query
          required: false
          description: |
            Comma-separated list of optional enrichments. Combine with a comma:
              * `meta` — inline `division` block (locality name, population, wikidata, parent)
              * `places` — inline `nearby_places` array with the nearest POIs (id, name, category, distance_m)
            Example: `include=meta,places`
          schema:
            type: string
          example: "meta,places"
        - name: places_radius
          in: query
          required: false
          description: Search radius in meters for `?include=places`. Default 200, max 1000.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
        - name: lang
          in: query
          required: false
          description: |
            BCP-47 language tag (e.g. `de`, `ja`, `zh-Hant`). Translates
            embedded admin-level names (city, state, country, district)
            using `divisions.name_international`. Sprint 2.1c.
          schema:
            type: string
          example: "de"
        - name: places_limit
          in: query
          required: false
          description: Max nearby places to return for `?include=places`. Default 5, max 20.
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        '200':
          description: Successful reverse geocoding response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReverseGeocodeResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Batch
      summary: Batch reverse geocode multiple coordinates
      description: Convert up to 10,000 coordinates to addresses in a single request
      operationId: reverseBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchReverseRequest'
      responses:
        '200':
          description: Successful batch reverse geocoding response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchReverseResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /validate:
    get:
      tags:
        - Address Tools
      summary: Validate a single address
      description: Check if an address is valid and deliverable, with detailed validation results
      operationId: validateAddress
      parameters:
        - name: q
          in: query
          required: true
          description: The address to validate
          schema:
            type: string
          example: "1600 Pennsylvania Ave, Washington DC"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Batch
      summary: Batch validate multiple addresses
      description: Validate up to 10,000 addresses in a single request
      operationId: validateBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchValidateRequest'
      responses:
        '200':
          description: Batch validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchValidateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /autocomplete:
    get:
      tags:
        - Address Tools
      summary: Autocomplete address input
      description: Get address suggestions as user types, optimized for type-ahead search
      operationId: autocomplete
      parameters:
        - name: q
          in: query
          required: true
          description: Partial address input
          schema:
            type: string
          example: "1600 Penn"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
        - name: limit
          in: query
          required: false
          description: Maximum suggestions to return (1-10)
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        '200':
          description: Autocomplete suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutocompleteResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /parse:
    get:
      tags:
        - Address Tools
      summary: Parse address into components
      description: Break down a freeform address into structured components (street, city, state, etc.)
      operationId: parseAddress
      parameters:
        - name: q
          in: query
          required: true
          description: The address to parse
          schema:
            type: string
          example: "1600 Pennsylvania Avenue NW, Washington, DC 20500"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
      responses:
        '200':
          description: Parsed address components
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Batch
      summary: Batch parse multiple addresses
      description: Parse up to 10,000 addresses into components in a single request
      operationId: parseBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchParseRequest'
      responses:
        '200':
          description: Batch parse results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchParseResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /standardize:
    get:
      tags:
        - Address Tools
      summary: Standardize address format
      description: Convert address to standardized USPS/postal format
      operationId: standardizeAddress
      parameters:
        - name: q
          in: query
          required: true
          description: The address to standardize
          schema:
            type: string
          example: "1600 penn ave washington dc"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
      responses:
        '200':
          description: Standardized address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardizeResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/nearby:
    get:
      tags:
        - Geocoding
      summary: Find addresses near a location
      description: Search for addresses within a radius of a given coordinate
      operationId: nearbyAddresses
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude of center point
          schema:
            type: number
            format: double
          example: 38.8977
        - name: lng
          in: query
          required: true
          description: Longitude of center point
          schema:
            type: number
            format: double
          example: -77.0365
        - name: radius
          in: query
          required: false
          description: Search radius in meters (1-5000)
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 100
        - name: limit
          in: query
          required: false
          description: Maximum results (1-50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Nearby addresses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyAddressesResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/street:
    get:
      tags:
        - Geocoding
      summary: Get all addresses on a street
      description: Retrieve all known addresses on a specific street
      operationId: streetAddresses
      parameters:
        - name: street
          in: query
          required: true
          description: Street name
          schema:
            type: string
          example: "Pennsylvania Avenue NW"
        - name: city
          in: query
          required: false
          description: City name
          schema:
            type: string
          example: "Washington"
        - name: state
          in: query
          required: false
          description: State/region
          schema:
            type: string
          example: "DC"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
        - name: limit
          in: query
          required: false
          description: Maximum results (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Street addresses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreetAddressesResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/stats:
    get:
      tags:
        - Geocoding
      summary: Get address database statistics
      description: Retrieve statistics about address coverage by country
      operationId: addressStats
      parameters:
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2) for country-specific stats
          schema:
            type: string
          example: "US"
      responses:
        '200':
          description: Address statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressStatsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/random:
    get:
      tags:
        - Geocoding
      summary: Get random addresses
      description: Retrieve random sample addresses, useful for testing and demos
      operationId: randomAddresses
      parameters:
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
        - name: limit
          in: query
          required: false
          description: Number of random addresses (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Random addresses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RandomAddressesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/compare:
    get:
      tags:
        - Address Tools
      summary: Compare two addresses
      description: Check if two addresses refer to the same location
      operationId: compareAddresses
      parameters:
        - name: address1
          in: query
          required: true
          description: First address
          schema:
            type: string
          example: "1600 Pennsylvania Ave NW, Washington DC"
        - name: address2
          in: query
          required: true
          description: Second address
          schema:
            type: string
          example: "1600 Penn Ave, Washington, DC 20500"
      responses:
        '200':
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/interpolate:
    get:
      tags:
        - Geocoding
      summary: Interpolate address location
      description: Estimate coordinates for an address using range interpolation when exact match unavailable
      operationId: interpolateAddress
      parameters:
        - name: q
          in: query
          required: true
          description: The address to interpolate
          schema:
            type: string
          example: "1601 Pennsylvania Ave, Washington DC"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
      responses:
        '200':
          description: Interpolated address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterpolateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addresses/crossstreet:
    get:
      tags:
        - Geocoding
      summary: Find cross street intersection
      description: Get the coordinates of an intersection between two streets
      operationId: crossStreet
      parameters:
        - name: street1
          in: query
          required: true
          description: First street name
          schema:
            type: string
          example: "Pennsylvania Avenue NW"
        - name: street2
          in: query
          required: true
          description: Second street name
          schema:
            type: string
          example: "17th Street NW"
        - name: city
          in: query
          required: false
          description: City name
          schema:
            type: string
          example: "Washington"
        - name: state
          in: query
          required: false
          description: State/region
          schema:
            type: string
          example: "DC"
        - name: country
          in: query
          required: false
          description: Country code (ISO 3166-1 alpha-2)
          schema:
            type: string
          example: "US"
      responses:
        '200':
          description: Cross street intersection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrossStreetResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Check API status and version
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object

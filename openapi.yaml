  /divisions/by-postcode:
    get:
      tags:
        - Divisions
      summary: Postcode → boundary (one-call)
      description: |
        Resolve a postcode + country code to its administrative division: bbox,
        polygon, population, Wikidata ID, parent admin chain — all in one
        nested response. The flagship one-call boundaries endpoint shipped in
        Sprint 1.

        Most other boundary APIs require two calls (geocode for an opaque
        place_id, then a separate fetch for the polygon). This endpoint gives
        you everything in a single billed request.
      operationId: divisionByPostcode
      parameters:
        - name: code
          in: query
          required: true
          description: Postcode / postal code. Country-aware normalization
            handles formats like "SW1A 1AA" (UK), "100-0001" (JP), "75001" (FR).
          schema: { type: string, example: "90210" }
        - name: country
          in: query
          required: true
          description: ISO 3166-1 alpha-2 country code.
          schema: { type: string, example: "US" }
        - name: include
          in: query
          required: false
          description: |
            Comma list. `geometry` adds the polygon at the requested precision;
            `other_names` attaches the full translations map (Sprint 2.1).
          schema: { type: string, example: "geometry,other_names" }
        - name: precision
          in: query
          required: false
          description: Polygon detail tier when include=geometry.
          schema: { type: string, enum: [low, med, full], default: med }
        - name: lang
          in: query
          required: false
          description: |
            BCP-47 language tag — replaces the division `name` with the
            Overture translation when available. Falls back to base language
            then to primary.
          schema: { type: string, example: de }
      responses:
        '200':
          description: Division resolved (with optional geometry + translations)
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: object
                    properties:
                      postcode: { type: string }
                      country:  { type: string }
                  result:
                    $ref: '#/components/schemas/DivisionResult'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Postcode not found in the requested country
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


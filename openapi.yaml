        brand:
          type: string
          nullable: true
          example: "Starbucks"
        operating_status:
          type: string
          nullable: true
          example: "open"
        confidence:
          type: number
          format: float
          example: 0.95
        source:
          type: string
          example: "Overture Maps Foundation"
        meta:
          $ref: '#/components/schemas/Meta'

    # Divisions Schemas
    CountriesResponse:
      type: object
      properties:
        countries:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
                example: "US"
              name:
                type: string
                example: "United States"
              divisions_count:
                type: integer
                example: 85000
              subtypes:
                type: array
                items:
                  type: string
                example: ["country", "region", "county", "locality"]
        total_countries:
          type: integer
          example: 52
        meta:
          $ref: '#/components/schemas/Meta'

    DivisionsStatsResponse:
      type: object
      properties:
        total_divisions:
          type: integer
          description: Total divisions in database
          example: 4600000
        countries:
          type: integer
          description: Number of countries with coverage
          example: 52
        subtypes:
          type: object
          additionalProperties:
            type: integer
          example:
            country: 250
            region: 5000
            county: 45000
            locality: 500000
            neighborhood: 150000
        by_country:
          type: array
          items:
            type: object
            properties:
              country:
                type: string
                example: "US"
              count:
                type: integer
                example: 85000
              name:
                type: string
                example: "United States"
        meta:
          $ref: '#/components/schemas/Meta'

    HierarchyResponse:
      type: object
      properties:
        division:
          $ref: '#/components/schemas/DivisionResult'
        hierarchy:
          type: array
          description: Parent divisions from immediate parent to country
          items:
            $ref: '#/components/schemas/DivisionResult'
        meta:
          $ref: '#/components/schemas/Meta'

    DivisionDetailResponse:
      type: object
      properties:
        id:
          type: string
          example: "08f28a8f-8c8b-4896-815e-c92c8df0a8a6"
        name:
          type: string
          example: "Los Angeles"
        location:
          $ref: '#/components/schemas/Location'
        subtype:
          type: string
          example: "locality"
        country:
          type: string
          example: "US"
        region:
          type: string
          nullable: true
          example: "US-CA"
        population:
          type: integer
          nullable: true
          example: 4030904
        area_km2:
          type: number
          nullable: true
          description: Area in square kilometers
          example: 1302.15
        wikidata:
          type: string
          nullable: true
          example: "Q65"
        parent_division_id:
          type: string
          nullable: true
          example: "9b3d1c83-d266-4c67-b21f-6ff37f4d6ccb"
        source:
          type: string
          example: "Overture Maps Foundation"
        meta:
          $ref: '#/components/schemas/Meta'

    # Utility Schemas
    TimezoneResponse:
      type: object
      properties:
        query:
          $ref: '#/components/schemas/Location'
        timezone:
          type: object
          properties:
            id:
              type: string
              description: IANA timezone identifier
              example: "America/New_York"
            name:
              type: string
              description: Human-readable timezone name
              example: "Eastern Time"
            utc_offset:
              type: string
              description: Current UTC offset
              example: "-05:00"
            dst_offset:
              type: string
              nullable: true
              description: DST offset (if applicable)
              example: "-04:00"
            is_dst:
              type: boolean
              description: Whether currently in DST
              example: false
        meta:
          $ref: '#/components/schemas/Meta'

    DistanceResponse:
      type: object
      properties:
        from:
          $ref: '#/components/schemas/Location'
        to:
          $ref: '#/components/schemas/Location'
        distance:
          type: number
          format: double
          description: Distance in requested unit
          example: 328.5
        unit:
          type: string
          enum: [km, mi, m]
          example: "km"
        bearing:
          type: number
          format: double
          description: Initial bearing from point 1 to point 2 (degrees)
          example: 225.3
        meta:
          $ref: '#/components/schemas/Meta'

    # IP Geolocation
    IPGeoResponse:
      type: object
      required: [ip, source]
      properties:
        ip:
          type: string
          example: "107.192.40.118"
        country:
          type: object
          properties:
            code:
              type: string
              example: "US"
            name:
              type: string
              example: "United States"
            wikidata:
              type: string
              nullable: true
        region:
          type: object
          properties:
            code:
              type: string
              example: "MI"
            name:
              type: string
              example: "Michigan"
        city:
          type: object
          properties:
            name:
              type: string
              example: "Grand Rapids"
        postcode:
          type: string
          example: "49504"
        location:
          type: object
          properties:
            latitude:
              type: number
              format: double
              example: 42.9733
            longitude:
              type: number
              format: double
              example: -85.7286
            accuracy_radius_km:
              type: integer
              description: |
                Radius (in km) within which MaxMind expects the IP to actually
                live. Anycast IPs return very large values (e.g. 1000) and
                receive `confidence: low`.
              example: 5
        timezone:
          type: string
          example: "America/Detroit"
        isp:
          type: object
          properties:
            asn:
              type: integer
              example: 7018
            name:
              type: string
              example: "AT&T Enterprises, LLC"
        county:
          $ref: '#/components/schemas/IPGeoDivision'
        locality:
          $ref: '#/components/schemas/IPGeoDivision'
        confidence:
          type: string
          enum: [high, medium, low]
          description: |
            Heuristic quality label. `high` requires a tight accuracy radius
            (≤50 km) **and** a polygon-derived county match. `low` is set
            for anycast / VPN / corporate / cellular IPs and the response
            also includes `accuracy_disclaimer`.
        accuracy_disclaimer:
          type: string
          nullable: true
          description: Surfaced only when `confidence == "low"`.
        source:
          type: string
          example: "maxmind-geolite2"
        db_build_at:
          type: string
          format: date-time
          description: Timestamp the .mmdb files were last refreshed (weekly cron).

    IPGeoDivision:
      type: object
      description: |
        Polygon-derived division (county or locality) containing the IP's
        coordinates. Pulled from our division_areas → divisions tables; only
        present when MaxMind returned a usable postcode.
      properties:
        name:
          type: string
          example: "Kent County"
        subtype:
          type: string
          example: "county"
        wikidata:
          type: string
          nullable: true
          example: "Q82499"

    # ── Routing schemas (Sprint 2.4) ────────────────────────────────────
    RoutingResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            distance_m:
              type: number
              description: Total route distance in meters
              example: 4500000
            duration_s:
              type: number
              description: Total route duration in seconds (factoring `depart_at` traffic if provided)
              example: 158400
            geometry:
              description: |
                LineString of the full route. Shape depends on `format=`:
                - `geojson` (default) — GeoJSON LineString with `[lng, lat]` coordinates
                - `polyline` — encoded polyline-6 string (precision 1e-6, not Google's 1e-5)
              oneOf:
                - $ref: '#/components/schemas/GeoJSONLineString'
                - type: string
            waypoints:
              type: array
              description: Echoed input waypoints in order
              items:
                $ref: '#/components/schemas/Coordinate'
            legs:
              type: array
              description: Per-leg breakdown (one entry per waypoint pair)
              items:
                $ref: '#/components/schemas/RouteLeg'
            alternates:
              type: array
              description: |
                Alternate routes (only present when `alternatives>0` was requested).
                Each has the same shape as the primary result minus the `alternates` key.
              items:
                $ref: '#/components/schemas/RouteAlternate'
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    RouteLeg:
      type: object
      properties:
        distance_m:
          type: number
        duration_s:
          type: number
        steps:
          type: array
          description: Turn-by-turn maneuvers (only when `instructions=true`)
          items:
            $ref: '#/components/schemas/RouteStep'

    RouteStep:
      type: object
      properties:
        instruction:
          type: string
          example: "Turn left onto West 42nd Street."
        distance_m:
          type: number
        duration_s:
          type: number
        street_name:
          type: string
          nullable: true
        maneuver:
          type: string
          description: Maneuver type (e.g. `turn-left`, `merge`, `roundabout`, `arrive`)

    RouteAlternate:
      type: object
      properties:
        distance_m:
          type: number
        duration_s:
          type: number
        geometry:
          oneOf:
            - $ref: '#/components/schemas/GeoJSONLineString'
            - type: string
        legs:
          type: array
          items:
            $ref: '#/components/schemas/RouteLeg'

    Coordinate:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    GeoJSONLineString:
      type: object
      description: GeoJSON LineString geometry
      properties:
        type:
          type: string
          enum: [LineString]
          example: LineString
        coordinates:
          type: array
          items:
            type: array
            minItems: 2
            maxItems: 3
            items:
              type: number
          example: [[-74.0060, 40.7128], [-74.0058, 40.7130], [-74.0050, 40.7140]]

    GeoJSONPolygon:
      type: object
      description: GeoJSON Polygon geometry
      properties:
        type:
          type: string
          enum: [Polygon]
          example: Polygon
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              minItems: 2
              maxItems: 3
              items:
                type: number

    RoutingMeta:
      type: object
      properties:
        version:
          type: string
          example: "1.0.0"
        engine:
          type: string
          example: "valhalla"
        request_id:
          type: string
          example: "rt_01H8X9..."

    IsolineResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            ranges:
              type: array
              description: One entry per requested range (in input order)
              items:
                type: object
                properties:
                  range:
                    type: number
                    description: Requested range value (seconds or meters per `type=`)
                    example: 600
                  type:
                    type: string
                    enum: [time, distance]
                  geometry:
                    $ref: '#/components/schemas/GeoJSONPolygon'
                  area_km2:
                    type: number
                    description: Polygon area in square kilometers
            mode:
              type: string
            origin:
              $ref: '#/components/schemas/Coordinate'
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    RouteMatrixRequest:
      type: object
      required: [sources, targets, mode]
      properties:
        sources:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/Coordinate'
          example: [{lat: 40.7128, lng: -74.0060}, {lat: 40.7589, lng: -73.9851}]
        targets:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/Coordinate'
          example: [{lat: 34.0522, lng: -118.2437}, {lat: 29.7604, lng: -95.3698}]
        mode:
          type: string
          enum: [drive, walk, bike, truck, motorcycle]
        units:
          type: string
          enum: [km, mi]
          default: km
        include:
          type: array
          description: Filter the response to only `distances`, only `durations`, or both
          items:
            type: string
            enum: [distances, durations]
          default: [distances, durations]
        depart_at:
          type: string
          format: date-time
        truck_height:
          type: number
        truck_weight:
          type: number
        truck_length:
          type: number
        truck_width:
          type: number
        truck_hazmat:
          type: boolean

    RouteMatrixResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            distances:
              type: array
              description: 2D array `[source][target]` of distances in meters (or miles if `units=mi`)
              items:
                type: array
                items:
                  type: number
            durations:
              type: array
              description: 2D array `[source][target]` of durations in seconds
              items:
                type: array
                items:
                  type: number
            sources:
              type: array
              items:
                $ref: '#/components/schemas/Coordinate'
            targets:
              type: array
              items:
                $ref: '#/components/schemas/Coordinate'
            mode:
              type: string
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    MapMatchRequest:
      type: object
      required: [trace, mode]
      properties:
        trace:
          type: array
          minItems: 2
          maxItems: 1000
          items:
            type: object
            required: [lat, lng]
            properties:
              lat:
                type: number
                format: double
              lng:
                type: number
                format: double
              time:
                type: string
                format: date-time
                description: Optional per-point timestamp (improves matching)
              accuracy_m:
                type: number
                description: Optional per-point horizontal accuracy in meters
        mode:
          type: string
          enum: [drive, walk, bike, truck, motorcycle]
        gps_accuracy_m:
          type: number
          description: Default per-point accuracy when not specified inline
          default: 10
        include_steps:
          type: boolean
          description: Include turn-by-turn instructions for the matched route
          default: false

    MapMatchResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            geometry:
              $ref: '#/components/schemas/GeoJSONLineString'
            distance_m:
              type: number
            duration_s:
              type: number
            matched_points:
              type: array
              description: Per-input-point match metadata, in input order
              items:
                type: object
                properties:
                  lat:
                    type: number
                  lng:
                    type: number
                  type:
                    type: string
                    description: "`matched` if successfully snapped, `interpolated` if filled by the engine, `unmatched` if outside the tile set"
                    enum: [matched, interpolated, unmatched]
                  edge_index:
                    type: integer
                    nullable: true
                  way_id:
                    type: integer
                    nullable: true
                    description: OSM way ID of the matched segment
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    OptimizeRouteResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            order:
              type: array
              description: Optimized visit order — array of indices into the input `waypoints` list
              items:
                type: integer
              example: [0, 2, 1, 3]
            distance_m:
              type: number
            duration_s:
              type: number
            geometry:
              $ref: '#/components/schemas/GeoJSONLineString'
            legs:
              type: array
              items:
                $ref: '#/components/schemas/RouteLeg'
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    LocateResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            input:
              $ref: '#/components/schemas/Coordinate'
            snapped:
              $ref: '#/components/schemas/Coordinate'
            distance_m:
              type: number
              description: Distance from input point to the snapped point
            road:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                  example: "West 42nd Street"
                class:
                  type: string
                  description: OSM-style road class
                  example: "secondary"
                speed_limit_kph:
                  type: integer
                  nullable: true
                  example: 50
                way_id:
                  type: integer
                  nullable: true
                  description: OSM way ID of the snapped segment
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    ElevationResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            elevations:
              type: array
              description: Per-input-point elevation. Units are meters by default, feet if `units=imperial`.
              items:
                type: object
                properties:
                  lat:
                    type: number
                  lng:
                    type: number
                  elevation:
                    type: number
                    nullable: true
                    description: null when no elevation tile covers the point
              example:
                - {lat: 40.7128, lng: -74.0060, elevation: 10}
                - {lat: 40.7589, lng: -73.9851, elevation: 21}
            units:
              type: string
              enum: [metric, imperial]
        meta:
          $ref: '#/components/schemas/RoutingMeta'

    BatchCreateRequest:
      type: object
      required: [inputs]
      properties:
        api:
          type: string
          description: |
            Wrapped endpoint, e.g. `/v1/geocode`. Can also be passed as a
            query parameter; body wins if both are present.
          example: "/v1/geocode"
        params:
          type: object
          description: Shared params merged into every input
          additionalProperties: true
          example:
            limit: "1"
        inputs:
          type: array
          minItems: 1
          maxItems: 1000000
          description: Per-input params; `id` is echoed on each result entry
          items:
            type: object
            required: [params]
            properties:
              id:
                type: string
                description: Optional caller-supplied id echoed back on the matching result entry
              params:
                type: object
                additionalProperties: true
          example:
            - id: "a"
              params: {q: "90210", country: "US"}
            - id: "b"
              params: {q: "10001", country: "US"}

    BatchCreateResponse:
      type: object
      properties:
        id:
          type: string
          example: "d3df23dc-1ebd-4f5f-a0a4-295ad2f6b96a"
        status_url:
          type: string
          format: uri
          example: "https://csv2geo.com/api/v1/batch/d3df23dc-1ebd-4f5f-a0a4-295ad2f6b96a"
        status:
          type: string
          enum: [pending]
        total_inputs:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time

    BatchResultEntry:
      type: object
      properties:
        input_id:
          type: string
          description: Echoed from BatchCreateRequest.inputs[].id when set
        status:
          type: integer
          description: HTTP status the wrapped endpoint returned for this input
          example: 200
        result:
          description: The wrapped endpoint's response body when status is 2xx
          oneOf:
            - type: object
            - type: array
        error:
          type: object
          properties:
            code: {type: string}
            message: {type: string}
        query:
          type: object
          additionalProperties: true
          description: Echo of the input params for this entry

    BatchGetResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        wrapped_endpoint:
          type: string
        total_inputs:
          type: integer
        completed_inputs:
          type: integer
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        results:
          type: array
          description: Populated only when status is terminal (completed/failed/cancelled)
          items:
            $ref: '#/components/schemas/BatchResultEntry'
        error:
          type: object
          properties:
            code: {type: string}
            message: {type: string}

          description: Latitude of first point
          schema:
            type: number
            format: double
          example: 40.7128
        - name: lng1
          in: query
          required: true
          description: Longitude of first point
          schema:
            type: number
            format: double
          example: -74.0060
        - name: lat2
          in: query
          required: true
          description: Latitude of second point
          schema:
            type: number
            format: double
          example: 38.8977
        - name: lng2
          in: query
          required: true
          description: Longitude of second point
          schema:
            type: number
            format: double
          example: -77.0365
        - name: unit
          in: query
          required: false
          description: Unit for distance (km, mi, m)
          schema:
            type: string

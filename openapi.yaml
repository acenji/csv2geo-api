          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ip:
    get:
      tags:
        - IP Geolocation
      summary: IP → geolocation (city, region, county, ASN)
      description: |
        Submillisecond IP-to-location lookup using MaxMind GeoLite2.
        Residential and business IPs additionally get a county + locality
        derived from our division_areas polygons (Sprint 2.7). Anycast IPs
        (Google DNS, Cloudflare DNS, CDN edges) return country only and
        are flagged with `confidence: low`.

        **Bundled into every plan including Free** — zero marginal cost,
        local DB lookup, no third-party API call.
      operationId: ipLookup
      parameters:
        - name: ip
          in: query
          required: true
          description: IPv4 or IPv6 address
          schema:
            type: string
          example: "8.8.8.8"
      responses:
        '200':
          description: IP geolocation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPGeoResponse'
        '400':
          description: Missing or invalid `ip` parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ip/me:
    get:
      tags:
        - IP Geolocation
      summary: Geolocate the requester's own IP
      description: |
        Convenience endpoint that uses the IP address of the request itself
        (honoring `X-Forwarded-For` from trusted proxies). Otherwise identical
        to `GET /ip?ip=...`.
      operationId: ipLookupMe
      responses:
        '200':
          description: IP geolocation result for the requester
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPGeoResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ip/batch:
    post:
      tags:
        - IP Geolocation
      summary: Batch IP geolocation
      description: |
        Resolve up to 1000 IPs in a single request. Per-IP errors (invalid
        format etc.) are returned inline in `results` rather than failing
        the whole batch.
      operationId: ipLookupBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ips]
              properties:
                ips:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 1000
                  example: ["8.8.8.8", "1.1.1.1", "107.192.40.118"]
      responses:
        '200':
          description: Per-IP results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/IPGeoResponse'
        '400':
          description: Missing or invalid body (e.g. empty `ips`, more than 1000)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Routing (Sprint 2.4) ────────────────────────────────────────────────
  # All routing endpoints share a common authentication and response envelope.
  # Powered by a self-hosted Valhalla engine over the global OSM network.
  # Available on the Pro plan and above; routing calls count 1:1 against the
  # standard daily quota.
  /routing:
    get:
      tags:
        - Routing
      summary: Turn-by-turn route through 2+ waypoints
      description: |
        Compute a route through two or more waypoints and return the polyline,
        distance, duration, per-leg breakdown, and (optionally) turn-by-turn
        maneuvers. Supports up to 2 alternate routes per request.

        **Modes**: `drive`, `walk`, `bike`, `truck`, `motorcycle`.
        Truck mode additionally accepts `truck_height`, `truck_weight`,
        `truck_length`, `truck_width`, `truck_hazmat` so the engine avoids
        bridges, tunnels and roads that violate any constraint.

        **Time-aware**: pass `depart_at=YYYY-MM-DDTHH:MM:SSZ` (or `arrive_at`)
        to factor historical traffic into the estimated duration.
      operationId: route
      parameters:
        - name: waypoints
          in: query
          required: true
          description: |
            Pipe-delimited list of `lat,lng` pairs in visit order. Minimum 2,
            maximum 50 per request.
          schema:
            type: string
          example: "40.7128,-74.0060|34.0522,-118.2437"
        - name: mode
          in: query
          required: true
          description: Transport profile
          schema:
            type: string
            enum: [drive, walk, bike, truck, motorcycle]
            default: drive
        - name: units
          in: query
          required: false
          description: Output unit for distance fields
          schema:
            type: string
            enum: [km, mi]
            default: km
        - name: alternatives
          in: query
          required: false
          description: Number of alternate routes to compute (0-2)
          schema:
            type: integer
            minimum: 0
            maximum: 2
            default: 0
        - name: instructions
          in: query
          required: false
          description: Include turn-by-turn maneuvers in the response
          schema:
            type: boolean
            default: false
        - name: lang
          in: query
          required: false
          description: BCP-47 language code for turn-by-turn instructions (e.g. `en`, `de`, `es`, `fr`, `it`, `ja`)
          schema:
            type: string
            default: en
        - name: avoid
          in: query
          required: false
          description: |
            Comma-separated list of road features to avoid.
            Accepts `tolls`, `highways`, `ferries`, `tunnels`, `borders`.
          schema:
            type: string
          example: "tolls,ferries"
        - name: depart_at
          in: query
          required: false
          description: ISO-8601 departure time for time-aware routing
          schema:
            type: string
            format: date-time
          example: "2026-05-15T08:30:00Z"
        - name: arrive_at
          in: query
          required: false
          description: ISO-8601 arrival time (alternative to `depart_at`)
          schema:
            type: string
            format: date-time
        - name: truck_height
          in: query
          required: false
          description: Vehicle height in meters (truck mode only)
          schema:
            type: number
            format: double
          example: 4.2
        - name: truck_weight
          in: query
          required: false
          description: Vehicle weight in kilograms (truck mode only)
          schema:
            type: number
            format: double
          example: 22000
        - name: truck_length
          in: query
          required: false
          description: Vehicle length in meters (truck mode only)
          schema:
            type: number
            format: double
        - name: truck_width
          in: query
          required: false
          description: Vehicle width in meters (truck mode only)
          schema:
            type: number
            format: double
        - name: truck_hazmat
          in: query
          required: false
          description: Vehicle is carrying hazardous materials (truck mode only)
          schema:
            type: boolean
            default: false
        - name: format
          in: query
          required: false
          description: |
            Output geometry encoding. `geojson` (default) returns a LineString;
            `polyline` returns an encoded polyline-6 string.
          schema:
            type: string
            enum: [geojson, polyline]
            default: geojson
      responses:
        '200':
          description: Route computed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingResponse'
        '400':
          description: Invalid request (missing/malformed waypoints, unsupported mode, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing (upgrade to Pro)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /isoline:
    get:
      tags:
        - Routing
      summary: Reachable-area isoline (isochrone)
      description: |
        Return the polygon of everywhere reachable from a single point within
        a given time budget (or distance). Up to 3 ranges per call render
        layered drive-time / walk-time rings in one response.
      operationId: isoline
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
          example: 40.7128
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
          example: -74.0060
        - name: mode
          in: query
          required: true
          schema:
            type: string
            enum: [drive, walk, bike, truck, motorcycle]
        - name: ranges
          in: query
          required: true
          description: |
            Comma-separated list of range values. Up to 3 entries.
            Units are seconds when `type=time` (default), meters when
            `type=distance`.
          schema:
            type: string
          example: "300,600,900"
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [time, distance]
            default: time
        - name: denoise
          in: query
          required: false
          description: Smoothing factor (0-1). Higher values yield simpler polygons.
          schema:
            type: number
            minimum: 0
            maximum: 1
            default: 0.5
        - name: generalize
          in: query
          required: false
          description: Douglas-Peucker simplification tolerance in meters
          schema:
            type: number
            minimum: 0
      responses:
        '200':
          description: Isoline polygons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsolineResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /route-matrix:
    post:
      tags:
        - Routing
      summary: Many-to-many distance + duration matrix
      description: |
        Compute distance and duration between every source and every target.
        Hard cap of 10,000 cells per request (e.g. 100×100 or 50×200).
        Truck attributes accepted at the request level — useful for fleet
        scheduling where the entire matrix shares one vehicle profile.
      operationId: routeMatrix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteMatrixRequest'
      responses:
        '200':
          description: Matrix of distance + duration cells
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteMatrixResponse'
        '400':
          description: Bad request (e.g. >10,000 cells, missing sources or targets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /map-match:
    post:
      tags:
        - Routing
      summary: Snap a noisy GPS trace to the road network
      description: |
        Submit a list of lat/lng points (optionally with timestamps and per-point
        accuracy estimates). The engine returns the cleaned line snapped to
        the most likely road segments plus per-point matched-road metadata.
        Up to 1,000 points per request.
      operationId: mapMatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapMatchRequest'
      responses:
        '200':
          description: Map-matched trace + per-point metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapMatchResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /optimize_route:
    get:
      tags:
        - Routing
      summary: Multi-stop route optimization (TSP)
      description: |
        Reorder a list of waypoints to minimize total drive time (or walk/bike/
        truck time per `mode=`). Returns the optimized visit order plus the
        same response shape as `/v1/routing` for the resulting path.

        Set `roundtrip=true` to return to the origin after visiting all stops.
      operationId: optimizeRoute
      parameters:
        - name: waypoints
          in: query
          required: true
          description: 3+ `lat,lng` pairs pipe-delimited. First entry is treated as the origin.
          schema:
            type: string
          example: "40.7128,-74.0060|34.0522,-118.2437|29.7604,-95.3698"
        - name: mode
          in: query
          required: true
          schema:
            type: string
            enum: [drive, walk, bike, truck, motorcycle]
        - name: roundtrip
          in: query
          required: false
          description: Return to the origin after the last stop
          schema:
            type: boolean
            default: false
        - name: units
          in: query
          required: false
          schema:
            type: string
            enum: [km, mi]
            default: km
      responses:
        '200':
          description: Optimized visit order + route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizeRouteResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /locate:
    get:
      tags:
        - Routing
      summary: Snap a single point to the nearest road segment
      description: |
        Given a lat/lng, return the nearest road in the routable network
        along with its corrected coordinate, road name, class, and speed
        limit (where available).
      operationId: locate
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
          example: 40.7128
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
          example: -74.0060
        - name: mode
          in: query
          required: false
          description: Restrict snap to roads usable by the given mode
          schema:
            type: string
            enum: [drive, walk, bike, truck, motorcycle]
            default: drive
        - name: radius_m
          in: query
          required: false
          description: Maximum snap distance in meters
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 500
      responses:
        '200':
          description: Snapped point + road metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /elevation:
    get:
      tags:
        - Routing
      summary: Per-point elevation along a coordinate list
      description: |
        Return elevation (meters above sea level) for each input coordinate.
        Useful for computing climb / descent / gradient profiles along a
        route or a recorded GPS track.

        Up to 1000 points per request.
      operationId: elevation
      parameters:
        - name: points
          in: query
          required: true
          description: Pipe-delimited `lat,lng` pairs, or an encoded polyline-6 string
          schema:
            type: string
          example: "40.7128,-74.0060|40.7589,-73.9851"
        - name: units
          in: query
          required: false
          schema:
            type: string
            enum: [metric, imperial]
            default: metric
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [array, geojson]
            default: array
      responses:
        '200':
          description: Per-point elevation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElevationResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan does not include routing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /icon:
    get:
      tags:
        - Maps
      summary: Generate a marker pin PNG
      description: |
        Returns a styled map pin as PNG. Pure CPU rasterizer; no DB hit,
        no auth tier gate (bundled into every plan). Output is fully
        deterministic per URL so the response is cached at the CDN edge
        with a 1-year `Cache-Control` header.

        v1 supports Font Awesome 6 Free Solid icons from a curated
        168-icon catalog (`GET /v1/icon/catalog` for the full list).
        Material Design is a planned follow-up.
      operationId: icon
      parameters:
        - name: icon
          in: query
          required: true
          description: Icon name from the catalog (case-insensitive)
          schema:
            type: string
            example: "tree"
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [awesome]
            default: awesome
        - name: color
          in: query
          required: false
          description: Pin body color, hex `#rgb` or `#rrggbb` (leading `#` optional)
          schema:
            type: string
            default: "#ff3b30"
            example: "#52b74c"
        - name: size
          in: query
          required: false
          schema:
            type: string
            enum: [small, medium, large, x-large]
            default: medium
        - name: noWhiteCircle
          in: query
          required: false
          description: If true, the glyph sits directly on the pin body
          schema:
            type: boolean
            default: false
        - name: scaleFactor
          in: query
          required: false
          description: Retina multiplier (1, 2, or 4)
          schema:
            type: integer
            enum: [1, 2, 4]
            default: 1
      responses:
        '200':
          description: PNG image of the marker pin
          headers:
            Cache-Control:
              description: Long-lived immutable cache
              schema:
                type: string
                example: "public, max-age=31536000, immutable"
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request (missing/unknown icon, invalid color/size/scaleFactor, unsupported type)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /icon/catalog:
    get:
      tags:
        - Maps
      summary: List available marker icon names
      operationId: iconCatalog
      responses:
        '200':
          description: Catalog of icons available to /v1/icon
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: {type: string, example: "awesome"}
                  version: {type: string, example: "Font Awesome 6 Free Solid 6.7.2"}
                  count: {type: integer, example: 168}
                  icons:
                    type: array
                    items: {type: string}
                    example: ["baby","bag-shopping","baseball","basket-shopping","basketball"]

  /batch:
    post:
      tags:
        - Batch
      summary: Create an async batch job
      description: |
        Submit up to 5,000 (Free) / 50,000 (Paid) / 1,000,000 (Enterprise) inputs
        against any single wrapped endpoint and get back a job id. Poll
        `/v1/batch/{id}` until status is `completed`, `failed`, or `cancelled`.

        Wrapped endpoints supported in this release:
        `/v1/geocode`, `/v1/reverse`, `/v1/autocomplete`, `/v1/validate`,
        `/v1/parse`, `/v1/standardize`, `/v1/postcode`, `/v1/places`,
        `/v1/places/nearby`, `/v1/divisions/by-postcode`,
        `/v1/divisions/contains`, `/v1/ip`, `/v1/routing`, `/v1/isoline`,
        `/v1/locate`, `/v1/elevation`.

        Permission required on the API key is the same as the wrapped
        endpoint (e.g., `routing` for `?api=/v1/routing`). Each input
        counts once toward the monthly quota at submission time; polling
        is free.
      operationId: batchCreate
      parameters:
        - name: api
          in: query
          required: false
          description: |
            Wrapped endpoint, e.g. `/v1/geocode`. Can also be passed in the
            request body as `api`. Body wins if both are present.
          schema:
            type: string
            example: "/v1/geocode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCreateRequest'
      responses:
        '202':
          description: Job accepted. Poll `status_url` until terminal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreateResponse'
        '400':
          description: Bad request (unknown wrapped endpoint, empty inputs, tier cap exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: API key lacks the permission required by the wrapped endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many concurrent batch jobs for this key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batch/{id}:
    get:
      tags:
        - Batch
      summary: Poll a batch job
      description: |
        Returns the job descriptor. HTTP status 202 while the job is
        pending or running; 200 when it has reached a terminal state
        (`completed`, `failed`, or `cancelled`). The `results` array
        is only populated once terminal.

        Pass `?compat=geoapify` to return the flat-array shape Geoapify's
        batch endpoint uses (drop-in SDK compatibility).
      operationId: batchGet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "d3df23dc-1ebd-4f5f-a0a4-295ad2f6b96a"
        - name: compat
          in: query
          required: false
          description: Pass `geoapify` to return the flat-array drop-in shape
          schema:
            type: string
            enum: [geoapify]
      responses:
        '200':
          description: Terminal state, results populated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchGetResponse'
        '202':
          description: Job still pending or running, results not yet populated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchGetResponse'
        '404':
          description: Job not found or TTL-expired (24 h after terminal)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Batch
      summary: Cancel a pending or running batch job
      operationId: batchCancel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum: [cancelled]
        '404':
          description: Job not found or already in a terminal state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tile/{source}/{z}/{x}/{y}.pbf:
    get:
      tags:
        - Maps
      summary: Fetch a vector map tile
      description: |
        Returns a single Mapbox Vector Tile (`.pbf`, gzip-encoded) for the
        requested `{z}/{x}/{y}` coordinate. Tiles are built from the global
        OpenStreetMap planet via Planetiler and served from a self-hosted
        Martin tile server (Seattle primary, Chicago backup).

        **Billing:** 0.25 credits per tile (4 tiles = 1 credit). Free tier
        3,000 daily credits = 12,000 tiles/day. The response carries a
        30-day immutable `Cache-Control` header so a CDN absorbs repeat
        views at no further cost.

        For MapLibre GL JS, you usually don't call this directly — use
        `GET /v1/tile/styles/{name}.json`, whose style document already
        references the tile URL. This endpoint is for wiring tiles into a
        non-MapLibre renderer (OpenLayers, Leaflet vector plugins).
      operationId: tile
      parameters:
        - name: source
          in: path
          required: true
          description: pmtiles archive name. Only `planet` is provisioned.
          schema:
            type: string
            default: planet
            example: planet
        - name: z
          in: path
          required: true
          description: Zoom level (0-14)
          schema: {type: integer, minimum: 0, maximum: 14, example: 10}
        - name: x
          in: path
          required: true
          description: Tile column
          schema: {type: integer, minimum: 0, example: 301}
        - name: y
          in: path
          required: true
          description: Tile row
          schema: {type: integer, minimum: 0, example: 384}
      responses:
        '200':
          description: Mapbox Vector Tile (protobuf, gzip-encoded)
          headers:
            Cache-Control:
              schema: {type: string, example: "public, max-age=2592000, immutable"}
          content:
            application/x-protobuf:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid coordinates or source name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tile/styles:
    get:
      tags:
        - Maps
      summary: List available map styles
      description: |
        Returns the catalog of MapLibre GL styles CSV2GEO publishes.
        Free — no credits charged. Three styles ship today: `csv2geo-bright`
        (general-purpose, brand-tuned), `positron` (pale, for data overlays),
        `dark-matter` (dark, for night-mode dashboards).
      operationId: tileStyles
      responses:
        '200':
          description: Style catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  styles:
                    type: array
                    items:
                      type: object
                      properties:
                        name: {type: string, example: "csv2geo-bright"}
                        display: {type: string, example: "CSV2GEO Bright"}
                        description: {type: string}
                        preview: {type: string, format: uri}
                        url: {type: string, format: uri}

  /tile/styles/{name}.json:
    get:
      tags:
        - Maps
      summary: Fetch a MapLibre GL style document
      description: |
        Returns a complete MapLibre GL style (spec version 8) for the named
        style, with this request's API key and the customer URL already
        substituted into the tile / sprite / glyph references. Free — no
        credits charged.

        Hand the URL of this endpoint straight to MapLibre GL JS:
        `new maplibregl.Map({ style: "https://csv2geo.com/api/v1/tile/styles/csv2geo-bright.json?api_key=YOUR_KEY" })`.
      operationId: tileStyle
      parameters:
        - name: name
          in: path
          required: true
          description: Style name
          schema:
            type: string
            enum: [csv2geo-bright, positron, dark-matter]
            example: csv2geo-bright
      responses:
        '200':
          description: MapLibre GL style document (spec version 8)
          content:
            application/json:
              schema:
                type: object
                description: A MapLibre GL JS style object (version, sources, layers, sprite, glyphs).
        '404':
          description: Unknown style name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key passed as query parameter
    ApiKeyHeader:
      type: http
      scheme: bearer
      description: API key passed as Bearer token in Authorization header

  schemas:
    RankInfo:
      type: object
      description: |
        Geoapify-shaped result-quality block. All three fields are optional —
        which fields appear depends on the endpoint:
          - Geocoding (`/geocode`, `/reverse`): emits `confidence` + `match_type`
            (the strength + nature of the address match).
          - Divisions (`/divisions/*`): emits `importance` only (Wikipedia
            popularity, useful for ranking divisions when multiple match a
            query).
      properties:
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Match strength (0-1) for the address geocode.
          example: 0.95
        match_type:
          type: string
          description: Nature of the geocoding match (full_match, fuzzy_match, fallback, etc.).
          example: full_match
        importance:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |
            Globally-recognized popularity score (0-1) for this entity. Sourced
            from Wikidata sitelink count — more language editions of Wikipedia
            with an article = higher importance. Backfilled on 1.02M divisions
            (Sprint B 2026-05-09). NYC and Paris both score 1.0; Tokyo 0.9994;
            small rural divisions ~0.2.
          example: 0.9803

    GeocodeResponse:
      type: object
      properties:
        query:
          type: string
          description: The original query
          example: "1600 Pennsylvania Ave, Washington DC"
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeResult'
        meta:
          $ref: '#/components/schemas/Meta'

    GeocodeResult:
      type: object
      properties:
        formatted_address:
          type: string
          description: Full formatted address
          example: "1600 Pennsylvania Avenue NW, Washington, DC 20500"
        location:
          $ref: '#/components/schemas/Location'
        accuracy:
          type: string
          description: Accuracy level of the geocode
          enum: [rooftop, range_interpolation, geometric_center, approximate]
          example: "rooftop"
        accuracy_score:
          type: number
          format: float
          description: Confidence score (0-1)
          example: 0.98
        rank:
          $ref: '#/components/schemas/RankInfo'
          description: |
            Result-quality block (Sprint 2.0). Emits `confidence` + `match_type`
            on geocoding results.
        components:
          $ref: '#/components/schemas/AddressComponents'
        source:
          type: string
          description: Data source attribution
          example: "Overture Maps Foundation"
        division:
          $ref: '#/components/schemas/DivisionMeta'
          description: |
            Inline locality metadata. Only present when the request passes
            `?include=meta`. Contains the containing division's name,
            population, wikidata, and one-level parent.
        nearby_places:
          type: array
          description: |
            Nearby POIs within `places_radius` meters of the result location.
            Only present when the request passes `?include=places`.
          items:
            type: object
            properties:
              id:
                type: string
                description: Overture place ID
              name:
                type: string
                example: "Starbucks"
              category:
                type: string
                example: "coffee_shop"
              distance_m:
                type: integer
                description: Distance from the result location, in meters
                example: 45

    DivisionMeta:
      type: object
      description: |
        Optional inline locality metadata, returned alongside a geocoding result
        when `?include=meta` is set on the request.
      properties:
        name:
          type: string
          example: "Washington"
        name_local:
          type: string
          description: Localized name in the division's primary script
          example: "Δήμος Πεντέλης"
        name_latin:
          type: string
          description: Latin transliteration when the primary name uses non-Latin script
          example: "Dimos Pentelis"
        subtype:
          type: string
          description: Administrative level
          enum: [country, region, county, locality, neighborhood, macrohood, microhood, dependency, localadmin]
          example: "locality"
        population:
          type: integer
          format: int64
          description: Population, when known
          example: 34934
        wikidata:
          type: string
          description: Wikidata QID for the division
          example: "Q4111041"
        parent:
          type: object
          description: One-level parent (region, county, etc.)
          properties:
            name:
              type: string
              example: "Attica Region"
            subtype:
              type: string
              example: "region"

    Location:
      type: object
      properties:
        lat:
          type: number
          format: double
          description: Latitude
          example: 38.8977
        lng:
          type: number
          format: double
          description: Longitude
          example: -77.0365

    AddressComponents:
      type: object
      properties:
        house_number:
          type: string
          example: "1600"
        street:
          type: string
          example: "Pennsylvania Avenue NW"
        unit:
          type: string
          nullable: true
          example: null
        city:
          type: string
          example: "Washington"
        state:
          type: string
          example: "DC"
        postcode:
          type: string
          example: "20500"
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: "US"

    ReverseGeocodeResponse:
      type: object
      properties:
        query:
          $ref: '#/components/schemas/Location'
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeResult'
        meta:
          $ref: '#/components/schemas/Meta'

    BatchGeocodeRequest:
      type: object
      required:
        - addresses
      properties:
        addresses:
          type: array
          description: List of addresses to geocode (max 10,000)
          maxItems: 10000
          items:
            type: string
          example:
            - "1600 Pennsylvania Ave, Washington DC"
            - "350 Fifth Avenue, New York, NY"
            - "1 Infinite Loop, Cupertino, CA"

    BatchGeocodeResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeResponse'
        meta:
          $ref: '#/components/schemas/BatchMeta'

    BatchReverseRequest:
      type: object
      required:
        - coordinates
      properties:
        coordinates:
          type: array
          description: List of coordinates to reverse geocode (max 10,000)
          maxItems: 10000
          items:
            $ref: '#/components/schemas/Location'
          example:
            - lat: 38.8977
              lng: -77.0365
            - lat: 40.7484
              lng: -73.9857

    BatchReverseResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ReverseGeocodeResponse'
        meta:
          $ref: '#/components/schemas/BatchMeta'

    Meta:
      type: object
      properties:
        version:
          type: string
          example: "v1"
        timestamp:
          type: string
          format: date-time
        credits_used:
          type: integer
          example: 1
        credits_remaining:
          type: integer
          example: 9999

    BatchMeta:
      type: object
      properties:
        version:
          type: string
          example: "v1"
        timestamp:
          type: string
          format: date-time
        total_addresses:
          type: integer
          example: 3
        successful:
          type: integer
          example: 3
        failed:
          type: integer
          example: 0
        credits_used:
          type: integer
          example: 3
        credits_remaining:
          type: integer
          example: 9997

    PlaceResult:
      type: object
      properties:
        name:
          type: string
          description: Place name
          example: "Starbucks"
        location:
          $ref: '#/components/schemas/Location'
        category:
          type: string
          description: Primary category
          example: "coffee_shop"
        categories:
          type: array
          description: All categories (primary + alternates)
          items:
            type: string
          example: ["coffee_shop", "cafe", "food_and_drink"]
        confidence:
          type: number
          format: float
          description: Data confidence score (0-1)
          example: 0.95
        address:
          type: string
          nullable: true
          description: Freeform address
          example: "123 Main St, New York, NY 10001"
        city:
          type: string
          nullable: true
          example: "New York"
        state:
          type: string
          nullable: true
          example: "NY"
        postcode:
          type: string
          nullable: true
          example: "10001"
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: "US"
        phone:
          type: string
          nullable: true
          description: Primary phone number
          example: "+1-555-123-4567"
        website:
          type: string
          nullable: true
          description: Primary website URL
          example: "https://www.starbucks.com"
        brand:
          type: string
          nullable: true
          description: Brand name (if applicable)
          example: "Starbucks"
        operating_status:
          type: string
          nullable: true
          description: Operating status (e.g., "open", "closed_permanently")
          example: "open"
        other_names:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: |
            Multi-language translation map. Present when `?include=other_names`
            is passed AND the place has language-tagged variants in Overture
            `names.rules`. Sourced from Overture; 234K places have a translation
            map across 17 languages today (Sprint 2.1b).
          example:
            en: "CoCo Ichibanya"
            ja: "CoCo壱番屋"

    PlacesSearchResponse:
      type: object
      properties:
        query:
          type: string
          description: The search query
          example: "starbucks"
        results:
          type: array
          items:
            $ref: '#/components/schemas/PlaceResult'
        meta:
          $ref: '#/components/schemas/Meta'

    PlacesNearbyResponse:
      type: object
      properties:
        query:
          $ref: '#/components/schemas/PlacesNearbyQuery'
        results:
          type: array
          items:
            $ref: '#/components/schemas/PlaceResult'
        meta:
          $ref: '#/components/schemas/Meta'

    PlacesNearbyQuery:
      type: object
      properties:
        location:
          $ref: '#/components/schemas/Location'
        radius:
          type: integer
          description: Search radius in meters
          example: 1000
        category:
          type: string
          nullable: true
          description: Category filter (if provided)
          example: "restaurant"

    CategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          description: List of all available categories
          items:
            type: string
          example: ["coffee_shop", "restaurant", "hotel", "gas_station", "pharmacy"]
        count:
          type: integer
          description: Total number of categories
          example: 150
        meta:
          $ref: '#/components/schemas/Meta'

    DivisionResult:
      type: object
      properties:
        name:
          type: string
          description: Division name. When `?lang=` is passed and a translation
            is available in `other_names`, this returns the localized name
            (Sprint 2.1). Falls back to base language ("pt" for "pt-BR")
            then to primary.
          example: "Los Angeles"
        other_names:
          type: object
          additionalProperties: { type: string }
          nullable: true
          description: Map of language tag → translated name. Only populated
            when `?include=other_names` is passed (Sprint 2.1). Source —
            Overture `names.common`.
          example: { de: "Los Angeles", ja: "ロサンゼルス", zh-Hans: "洛杉矶", ar: "لوس أنجلوس" }
        location:
          $ref: '#/components/schemas/Location'
        subtype:
          type: string
          description: Division type (locality, county, neighborhood, etc.)
          example: "locality"
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: "US"
        region:
          type: string
          nullable: true
          description: Region code (e.g., US-CA for California)
          example: "US-CA"
        population:
          type: integer
          nullable: true
          description: Population (if available)
          example: 4030904
        wikidata:
          type: string
          nullable: true
          description: Wikidata ID for this division
          example: "Q65"
        parent_division_id:
          type: string
          nullable: true
          description: Overture ID of the parent division
          example: "9b3d1c83-d266-4c67-b21f-6ff37f4d6ccb"
        rank:
          $ref: '#/components/schemas/RankInfo'
          description: |
            Result-quality block. On division responses, only `importance`
            is populated — a 0-1 score derived from Wikidata sitelink count
            (Sprint B 2026-05-09). Use it to rank divisions when multiple
            match a query — Tokyo, Paris, NYC ≈ 1.0; small rural divisions
            ~0.2. About 22% of divisions (~1.02M) have a value.

    DivisionsSearchResponse:
      type: object
      properties:
        query:
          type: string
          description: The search query
          example: "los angeles"
        results:
          type: array
          items:
            $ref: '#/components/schemas/DivisionResult'
        meta:
          $ref: '#/components/schemas/Meta'

    DivisionsContainsResponse:
      type: object
      properties:
        query:
          $ref: '#/components/schemas/Location'
        results:
          type: array
          items:
            $ref: '#/components/schemas/DivisionResult'
        meta:
          $ref: '#/components/schemas/Meta'

    DivisionsSubtypesResponse:
      type: object
      properties:
        subtypes:
          type: array
          description: List of all available division subtypes
          items:
            type: string
          example: ["country", "region", "county", "locality", "neighborhood", "macrohood", "microhood"]
        count:
          type: integer
          description: Total number of subtypes
          example: 7
        meta:
          $ref: '#/components/schemas/Meta'

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: |
                Error code. Possible values:
                - `missing_api_key` - No API key provided
                - `invalid_api_key` - API key not found or malformed
                - `api_key_revoked` - API key has been revoked
                - `insufficient_permissions` - API key lacks required permission
                - `rate_limit_exceeded` - Too many requests
                - `invalid_request` - Missing or invalid parameters
              example: "invalid_api_key"
            message:
              type: string
              description: Human-readable error message
              example: "The provided API key is invalid or has been revoked."
            status:
              type: integer
              description: HTTP status code
              example: 401
            retry_after:
              type: integer
              description: Seconds to wait before retrying (only for rate_limit_exceeded)
              example: 45

    # Address Tools Schemas
    ValidateResponse:

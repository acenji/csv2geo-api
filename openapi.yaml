  /divisions/hierarchy/{id}:
    get:
      tags:
        - Divisions
      summary: Get immediate sub-divisions (children)
      description: |
        Returns the immediate children of a division (entries with parent_division_id == :id).
        For the walk-UP "part-of" chain, use /divisions/ancestors/{id}.
      operationId: divisionHierarchy
      parameters:
        - name: id
          in: path
          required: true
          description: Division ID (Overture ID)
          schema:
            type: string
          example: "08f28a8f-8c8b-4896-815e-c92c8df0a8a6"
        - name: subtype
          in: query
          required: false
          description: Filter children by admin subtype
          schema:
            type: string
            example: county
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        '200':
          description: Division hierarchy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HierarchyResponse' }
        '404':
          description: Division not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /divisions/ancestors/{id}:
    get:
      tags:
        - Divisions
      summary: Walk-up "part-of" chain (Sprint 1.8)
      description: |
        Walks `parent_division_id` from the input UP to the root, returning the
        ordered chain (input → parent → grandparent → ... → country).
        This is the true "boundaries/part-of" feature.
      operationId: divisionAncestors
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: include
          in: query
          description: Comma list — `geometry` for polygons per level,
            `other_names` to attach the full translations map per division (Sprint 2.1).
          schema: { type: string, example: "geometry,other_names" }
        - name: precision
          in: query
          description: Polygon detail tier when include=geometry.
          schema: { type: string, enum: [low, med, full], default: med }
        - name: max_depth
          in: query
          description: Hard cap on chain length (default 8, max 12).
          schema: { type: integer, default: 8, minimum: 1, maximum: 12 }
        - name: lang
          in: query
          description: BCP-47 language tag — replaces each `name` with the
            Overture `names.common[lang]` translation when available, else
            falls back to base language then to primary (Sprint 2.1).
          schema: { type: string, example: de }
      responses:
        '200':
          description: Ordered ancestor chain
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  depth: { type: integer }
                  results:
                    type: array
                    items: { $ref: '#/components/schemas/DivisionResult' }
        '404':
          description: Division not found

  /divisions/children/{id}:
    get:
      tags:
        - Divisions
      summary: Children of a division (Sprint 1.8 — clearer-named alias of /divisions/hierarchy/{id})
      description: |
        Returns the immediate sub-divisions of a parent. Identical to
        /divisions/hierarchy/{id} when no geometry is requested. Adds polygon
        enrichment per child when ?include=geometry.
      operationId: divisionChildren
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: include
          in: query
          description: Comma list — `geometry` for polygons, `other_names`
            for translations (Sprint 2.1).
          schema: { type: string, example: "geometry,other_names" }
        - name: precision
          in: query
          schema: { type: string, enum: [low, med, full], default: med }
        - name: subtype
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
        - name: lang
          in: query
          description: BCP-47 language tag for localizing each child's `name` (Sprint 2.1).
          schema: { type: string, example: ja }
      responses:
        '200':
          description: Children list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HierarchyResponse' }

  /divisions/consolidated/{id}:
    get:
      tags:
        - Divisions
      summary: Consolidated entity lookup (Sprint 1.8)
      description: |
        Resolves either a canonical id (e.g. NYC) or a member id (any of
        Manhattan, Brooklyn, Queens, The Bronx, Staten Island) into the
        consolidated record — canonical division + members[] + matched_as.
        Source: curated Wikidata P150 mapping.
      operationId: divisionConsolidated
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: include
          in: query
          description: Comma list — `geometry` for canonical polygon, `other_names`
            for translations on canonical + members (Sprint 2.1).
          schema: { type: string, example: "geometry,other_names" }
        - name: precision
          in: query
          schema: { type: string, enum: [low, med, full], default: med }
        - name: lang
          in: query
          description: BCP-47 language tag — localizes both the canonical and
            member division names (Sprint 2.1).
          schema: { type: string, example: zh-Hant }
      responses:
        '200':
          description: Consolidated entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  canonical: { $ref: '#/components/schemas/DivisionResult' }
                  members:
                    type: array
                    items: { $ref: '#/components/schemas/DivisionResult' }
                  matched_as: { type: string, enum: [canonical, member] }
                  source: { type: string, example: wikidata-p150 }
        '404':
          description: Division is not part of any consolidated entity
        '503':
          description: consolidated_aliases collection not configured on this cluster

  /divisions/by-id/{id}:

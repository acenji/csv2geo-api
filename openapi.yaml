                    example: "active"
        '401':
          description: Invalid API key

  /places:
    get:
      tags:
        - Places
      summary: Search places by name
      description: |
        Search for points of interest (POIs) by name. Returns businesses, landmarks, and other places matching your query.

        Uses text search to match place names and brand names.
      operationId: searchPlaces
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (place name, brand, etc.)
          schema:
            type: string
          example: "starbucks"
        - name: category
          in: query
          required: false
          description: |
            Filter by category. Sprint 2.2a — accepts BOTH:
              * Leaf code (legacy): `coffee_shop`, `sushi_restaurant`, `restaurant`
              * Hierarchical dot path: `eat_and_drink`, `eat_and_drink.restaurant`,
                `eat_and_drink.restaurant.asian_restaurant.sushi_restaurant`
            When the value matches a non-leaf taxonomy node, the filter expands
            to all descendants. So `category=eat_and_drink.restaurant` returns
            ALL restaurants regardless of cuisine; `category=eat_and_drink`
            returns all food/drink venues. Source: Overture taxonomy
            (2,118 categories, 22 top-level groups, 1-4 depth levels).
            See `/v1/places/categories?include=taxonomy` for the full tree.
          schema:
            type: string
          example: "eat_and_drink.restaurant"
        - name: country
          in: query
          required: false
          description: Filter by country (ISO 3166-1 alpha-2). Defaults to "US"
          schema:
            type: string
            default: "US"
          example: "US"
        - name: filter
          in: query
          required: false
          description: |
            Geoapify-shape geographic filter. Accepts:
              * `rect:lon1,lat1,lon2,lat2` — bounding box (any 2 opposite corners)
              * `circle:lon,lat,radius_m` — radius in meters around a point
            When `filter` is set, neither `country` nor `city` is required.
            Sprint 2.2c.
          schema:
            type: string
          example: "circle:-73.9857,40.7580,500"
        - name: limit
          in: query
          required: false
          description: Maximum number of results (1-50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: lang
          in: query
          required: false
          description: |
            BCP-47 language tag — replaces each `name` with the Overture
            translation when available, falling back to base language then
            primary (Sprint 2.1b — 234K places across 17 langs).
          schema: { type: string, example: ja }
        - name: include
          in: query
          required: false
          description: |
            Comma list. Currently `other_names` — attaches the full
            translations map under `other_names` on each result.
          schema: { type: string, example: "other_names" }
      responses:
        '200':
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacesSearchResponse'
        '400':
          description: Bad request - missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: missing_query
                  message: "The 'q' parameter is required for place search"
                  status: 400
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /places/nearby:
    get:
      tags:
        - Places
      summary: Find places near a location
      description: |
        Search for places within a radius of a given location. Results are sorted by distance from the center point.

        Uses geospatial indexing for efficient nearby searches.
      operationId: nearbyPlaces
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude of center point
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          example: 40.7128
        - name: lng
          in: query
          required: true
          description: Longitude of center point
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          example: -74.0060
        - name: radius
          in: query
          required: false
          description: Search radius in meters (1-50000). Default is 1000m (1km)
          schema:
            type: integer
            minimum: 1
            maximum: 50000
            default: 1000
        - name: category
          in: query
          required: false
          description: Filter by category
          schema:
            type: string
          example: "restaurant"
        - name: limit
          in: query
          required: false
          description: Maximum number of results (1-50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: lang
          in: query
          required: false
          description: |
            BCP-47 language tag — replaces each `name` with the Overture
            translation when available (Sprint 2.1b — 234K places, 17 langs).
          schema: { type: string, example: ja }
        - name: include
          in: query
          required: false
          description: |
            Comma list. `other_names` attaches the full translations map.
          schema: { type: string, example: "other_names" }
      responses:
        '200':
          description: Successful nearby search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacesNearbyResponse'
        '400':
          description: Bad request - invalid coordinates or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_coordinates:
                  summary: Missing coordinates
                  value:
                    error:
                      code: missing_coordinates
                      message: "Both 'lat' and 'lng' parameters are required"
                      status: 400
                invalid_latitude:
                  summary: Invalid latitude
                  value:
                    error:
                      code: invalid_latitude
                      message: "Latitude must be a number between -90 and 90"
                      status: 400
                invalid_longitude:
                  summary: Invalid longitude
                  value:
                    error:
                      code: invalid_longitude
                      message: "Longitude must be a number between -180 and 180"
                      status: 400
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

